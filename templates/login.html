<!doctype html>
<html lang="ko" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>로그인 - SMS 가계부</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>input { color-scheme: dark; }</style>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center">
  <form method="post" action="/login" class="bg-slate-900 border border-slate-800 p-8 rounded-xl shadow-2xl w-full max-w-sm">
    <h1 class="text-2xl font-bold mb-6 text-center text-slate-100">💰 SMS 가계부</h1>
    {% if error %}
    <div class="mb-4 p-3 bg-red-900/30 border border-red-800 text-red-300 rounded text-sm">비밀번호가 틀렸습니다.</div>
    {% endif %}
    <label class="block text-sm font-medium mb-1 text-slate-300">관리자 비밀번호</label>
    <input type="password" name="password" required autofocus
           class="w-full bg-slate-800 border border-slate-700 text-slate-100 rounded px-3 py-2 mb-4 focus:ring-2 focus:ring-blue-500 focus:outline-none" />
    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-2 rounded font-medium">로그인</button>
  </form>
</body>
</html>
